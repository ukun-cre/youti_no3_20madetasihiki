<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B9D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>かんじ だいすき！</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- ===== CONFETTI CANVAS ===== -->
<canvas id="confettiCanvas"></canvas>

<!-- ===== MENU SCREEN ===== -->
<div id="screen-menu" class="screen active">
  <div class="menu-bg-shapes">
    <div class="shape s1"></div>
    <div class="shape s2"></div>
    <div class="shape s3"></div>
    <div class="shape s4"></div>
  </div>

  <div class="menu-header">
    <div class="title-badge">
      <span class="title-jp">かんじ</span>
      <span class="title-en">KANJI</span>
      <span class="title-jp">だいすき！</span>
    </div>
    <div class="stars-row">⭐⭐⭐</div>
  </div>

  <!-- Neko teacher on menu -->
  <div class="neko-scene-menu">
    <div class="neko-teacher" id="nekoMenu">
      <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" width="160" height="176">
        <!-- Body -->
        <ellipse cx="100" cy="165" rx="52" ry="45" fill="#FFD580"/>
        <!-- Teacher outfit -->
        <ellipse cx="100" cy="165" rx="48" ry="40" fill="#5B8DEF"/>
        <!-- Collar/bow -->
        <polygon points="90,130 100,145 110,130 105,155 95,155" fill="#FF6B9D"/>
        <!-- Head -->
        <circle cx="100" cy="105" r="52" fill="#FFD580"/>
        <!-- Ears -->
        <polygon points="55,70 48,40 78,62" fill="#FFD580"/>
        <polygon points="60,68 55,48 76,63" fill="#FFB6C1"/>
        <polygon points="145,70 152,40 122,62" fill="#FFD580"/>
        <polygon points="140,68 145,48 124,63" fill="#FFB6C1"/>
        <!-- Face -->
        <circle cx="82" cy="100" r="9" fill="white"/>
        <circle cx="118" cy="100" r="9" fill="white"/>
        <circle cx="84" cy="101" r="5" fill="#333"/>
        <circle cx="120" cy="101" r="5" fill="#333"/>
        <circle cx="86" cy="99" r="2" fill="white"/>
        <circle cx="122" cy="99" r="2" fill="white"/>
        <!-- Nose -->
        <ellipse cx="100" cy="112" rx="5" ry="3.5" fill="#FF85A1"/>
        <!-- Mouth -->
        <path d="M92,118 Q100,126 108,118" stroke="#FF85A1" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Whiskers -->
        <line x1="60" y1="112" x2="90" y2="115" stroke="#999" stroke-width="1.5"/>
        <line x1="58" y1="118" x2="88" y2="118" stroke="#999" stroke-width="1.5"/>
        <line x1="110" y1="115" x2="140" y2="112" stroke="#999" stroke-width="1.5"/>
        <line x1="112" y1="118" x2="142" y2="118" stroke="#999" stroke-width="1.5"/>
        <!-- Glasses -->
        <circle cx="82" cy="100" r="12" fill="none" stroke="#8B6914" stroke-width="2.5"/>
        <circle cx="118" cy="100" r="12" fill="none" stroke="#8B6914" stroke-width="2.5"/>
        <line x1="94" y1="100" x2="106" y2="100" stroke="#8B6914" stroke-width="2.5"/>
        <line x1="58" y1="96" x2="70" y2="99" stroke="#8B6914" stroke-width="2"/>
        <line x1="130" y1="99" x2="142" y2="96" stroke="#8B6914" stroke-width="2"/>
        <!-- Pointer stick -->
        <line x1="152" y1="145" x2="185" y2="90" stroke="#8B6914" stroke-width="4" stroke-linecap="round"/>
        <circle cx="186" cy="88" r="5" fill="#FF6B9D"/>
        <!-- Tail -->
        <path d="M148,200 Q185,175 178,150" stroke="#FFD580" stroke-width="14" fill="none" stroke-linecap="round"/>
        <path d="M148,200 Q185,175 178,150" stroke="#FFB88C" stroke-width="7" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="speech-bubble-menu bounce-in">
      <span>いっしょに かんじを</span>
      <span>おぼえよう！✨</span>
    </div>
  </div>

  <div class="menu-buttons">
    <button class="menu-btn btn-start" onclick="App.startGame()" id="btnStart">
      <span class="btn-icon">🎮</span>
      <span class="btn-label">ゲームスタート</span>
    </button>
    <button class="menu-btn btn-settings" onclick="App.showScreen('settings')">
      <span class="btn-icon">⚙️</span>
      <span class="btn-label">せってい</span>
    </button>
    <button class="menu-btn btn-records" onclick="App.showScreen('records')">
      <span class="btn-icon">🏆</span>
      <span class="btn-label">きろく</span>
    </button>
  </div>
</div>

<!-- ===== SETTINGS SCREEN ===== -->
<div id="screen-settings" class="screen">
  <div class="screen-header settings-header">
    <button class="back-btn" onclick="App.showScreen('menu')">←</button>
    <h2>⚙️ せってい</h2>
  </div>
  <div class="settings-body">

    <div class="settings-card">
      <div class="settings-neko-mini">
        <svg viewBox="0 0 100 80" width="70" height="56">
          <circle cx="50" cy="45" r="28" fill="#FFD580"/>
          <polygon points="28,30 22,10 42,26" fill="#FFD580"/>
          <polygon points="30,29 26,14 40,26" fill="#FFB6C1"/>
          <polygon points="72,30 78,10 58,26" fill="#FFD580"/>
          <polygon points="70,29 74,14 60,26" fill="#FFB6C1"/>
          <circle cx="40" cy="43" r="5" fill="white"/>
          <circle cx="60" cy="43" r="5" fill="white"/>
          <circle cx="41" cy="43" r="3" fill="#333"/>
          <circle cx="61" cy="43" r="3" fill="#333"/>
          <ellipse cx="50" cy="51" rx="3" ry="2" fill="#FF85A1"/>
          <path d="M44,56 Q50,62 56,56" stroke="#FF85A1" stroke-width="1.5" fill="none"/>
          <circle cx="40" cy="43" r="7" fill="none" stroke="#8B6914" stroke-width="1.5"/>
          <circle cx="60" cy="43" r="7" fill="none" stroke="#8B6914" stroke-width="1.5"/>
          <line x1="47" y1="43" x2="53" y2="43" stroke="#8B6914" stroke-width="1.5"/>
        </svg>
      </div>
      <h3 class="settings-section-title">🔊 おとのせってい</h3>
      <div class="toggle-row">
        <span class="toggle-label">おとをならす</span>
        <label class="toggle-switch">
          <input type="checkbox" id="soundToggle" checked onchange="App.toggleSound(this.checked)">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="settings-card">
      <h3 class="settings-section-title">📚 むずかしさのせってい</h3>
      <div class="difficulty-options">
        <button class="diff-btn active" id="diff-easy" onclick="App.setDifficulty('easy')">
          <span class="diff-emoji">⭐</span>
          <span class="diff-name">かんたん</span>
          <span class="diff-desc">漢字10こ</span>
        </button>
        <button class="diff-btn" id="diff-hard" onclick="App.setDifficulty('hard')">
          <span class="diff-emoji">⭐⭐</span>
          <span class="diff-name">むずかしい</span>
          <span class="diff-desc">漢字20こ</span>
        </button>
      </div>
    </div>

    <button class="save-btn" onclick="App.saveSettings()">
      <span>💾 ほぞんする</span>
    </button>
  </div>
</div>

<!-- ===== RECORDS SCREEN ===== -->
<div id="screen-records" class="screen">
  <div class="screen-header records-header">
    <button class="back-btn" onclick="App.showScreen('menu')">←</button>
    <h2>🏆 きろく</h2>
  </div>
  <div class="records-body">
    <div class="trophy-display">
      <div class="trophy-icon" id="trophyIcon">🏆</div>
      <div class="record-label">さいこうれんぞくせいかい</div>
      <div class="record-number" id="recordNumber">0</div>
      <div class="record-unit">もん</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">🎯</div>
        <div class="stat-label">ぜんぶのせいかい</div>
        <div class="stat-value" id="totalCorrect">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎮</div>
        <div class="stat-label">あそんだかいすう</div>
        <div class="stat-value" id="totalGames">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⭐</div>
        <div class="stat-label">おぼえた漢字</div>
        <div class="stat-value" id="learnedKanji">0</div>
      </div>
    </div>

    <div class="learned-kanji-display" id="learnedKanjiDisplay"></div>

    <button class="reset-btn" onclick="App.confirmReset()">🗑️ きろくをけす</button>
  </div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="screen-game" class="screen">
  <!-- Progress bar -->
  <div class="game-topbar">
    <button class="quit-btn" onclick="App.quitGame()">✖</button>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="score-chip" id="scoreChip">⭐ 0</div>
  </div>

  <!-- Neko teacher in game -->
  <div class="neko-teacher-game" id="nekoGame">
    <svg viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg" width="100" height="108">
      <ellipse cx="60" cy="100" rx="32" ry="28" fill="#5B8DEF"/>
      <polygon points="52,78 60,88 68,78 65,95 55,95" fill="#FF6B9D"/>
      <circle cx="60" cy="62" r="32" fill="#FFD580"/>
      <polygon points="33,44 27,22 48,40" fill="#FFD580"/>
      <polygon points="36,43 32,28 46,40" fill="#FFB6C1"/>
      <polygon points="87,44 93,22 72,40" fill="#FFD580"/>
      <polygon points="84,43 88,28 74,40" fill="#FFB6C1"/>
      <circle cx="49" cy="60" r="6" fill="white"/>
      <circle cx="71" cy="60" r="6" fill="white"/>
      <circle cx="50" cy="61" r="3.5" fill="#333" id="nekoEyeL"/>
      <circle cx="72" cy="61" r="3.5" fill="#333" id="nekoEyeR"/>
      <circle cx="51" cy="60" r="1.2" fill="white"/>
      <circle cx="73" cy="60" r="1.2" fill="white"/>
      <ellipse cx="60" cy="68" rx="3.5" ry="2.5" fill="#FF85A1"/>
      <path d="M54,73 Q60,79 66,73" stroke="#FF85A1" stroke-width="2" fill="none" stroke-linecap="round" id="nekoMouth"/>
      <line x1="36" y1="67" x2="54" y2="70" stroke="#999" stroke-width="1.2"/>
      <line x1="35" y1="72" x2="53" y2="73" stroke="#999" stroke-width="1.2"/>
      <line x1="66" y1="70" x2="84" y2="67" stroke="#999" stroke-width="1.2"/>
      <line x1="67" y1="73" x2="85" y2="72" stroke="#999" stroke-width="1.2"/>
      <circle cx="49" cy="60" r="8" fill="none" stroke="#8B6914" stroke-width="1.8"/>
      <circle cx="71" cy="60" r="8" fill="none" stroke="#8B6914" stroke-width="1.8"/>
      <line x1="57" y1="60" x2="63" y2="60" stroke="#8B6914" stroke-width="1.8"/>
      <line x1="35" y1="57" x2="41" y2="59" stroke="#8B6914" stroke-width="1.5"/>
      <line x1="79" y1="59" x2="85" y2="57" stroke="#8B6914" stroke-width="1.5"/>
      <path d="M90,115 Q110,105 107,90" stroke="#FFD580" stroke-width="10" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Speech bubble -->
  <div class="speech-bubble-game" id="speechBubble">
    <span id="speechText">このイラストは どんな かんじ？</span>
  </div>

  <!-- Kanji transformation stage -->
  <div class="kanji-stage" id="kanjiStage">
    <div class="illustration-wrap" id="illustrationWrap">
      <!-- SVG illustration injected here -->
    </div>
    <div class="transform-arrow" id="transformArrow">
      <svg viewBox="0 0 60 30" width="60" height="30">
        <path d="M5,15 L45,15 M35,5 L50,15 L35,25" stroke="#FF6B9D" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="kanji-display" id="kanjiDisplay">
      <span id="kanjiChar"></span>
    </div>
  </div>

  <!-- Question label -->
  <div class="question-prompt" id="questionPrompt">
    このかんじ、どれかな？
  </div>

  <!-- Answer choices -->
  <div class="choices-grid" id="choicesGrid">
    <!-- Injected by JS -->
  </div>

  <!-- Combo display -->
  <div class="combo-display" id="comboDisplay"></div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div id="screen-result" class="screen">
  <div class="result-body">
    <div class="result-neko" id="resultNeko">
      <svg viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg" width="130" height="146">
        <ellipse cx="80" cy="138" rx="40" ry="34" fill="#5B8DEF"/>
        <polygon points="68,105 80,118 92,105 88,128 72,128" fill="#FF6B9D"/>
        <circle cx="80" cy="82" r="40" fill="#FFD580"/>
        <polygon points="42,56 35,28 62,50" fill="#FFD580"/>
        <polygon points="45,54 40,36 59,50" fill="#FFB6C1"/>
        <polygon points="118,56 125,28 98,50" fill="#FFD580"/>
        <polygon points="115,54 120,36 101,50" fill="#FFB6C1"/>
        <!-- Happy eyes -->
        <path d="M55,78 Q62,70 69,78" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M91,78 Q98,70 105,78" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="80" cy="88" rx="4.5" ry="3" fill="#FF85A1"/>
        <path d="M70,95 Q80,105 90,95" stroke="#FF85A1" stroke-width="3" fill="none" stroke-linecap="round"/>
        <line x1="45" y1="87" x2="68" y2="90" stroke="#999" stroke-width="1.5"/>
        <line x1="44" y1="93" x2="67" y2="93" stroke="#999" stroke-width="1.5"/>
        <line x1="92" y1="90" x2="115" y2="87" stroke="#999" stroke-width="1.5"/>
        <line x1="93" y1="93" x2="116" y2="93" stroke="#999" stroke-width="1.5"/>
        <circle cx="62" cy="78" r="9" fill="none" stroke="#8B6914" stroke-width="2"/>
        <circle cx="98" cy="78" r="9" fill="none" stroke="#8B6914" stroke-width="2"/>
        <line x1="71" y1="78" x2="89" y2="78" stroke="#8B6914" stroke-width="2"/>
        <!-- Stars around neko -->
        <text x="15" y="40" font-size="20" fill="#FFD700">⭐</text>
        <text x="120" y="35" font-size="18" fill="#FFD700">✨</text>
        <text x="10" y="120" font-size="16" fill="#FF6B9D">💫</text>
        <text x="130" y="110" font-size="20" fill="#FFD700">⭐</text>
        <!-- Paws up -->
        <ellipse cx="38" cy="130" rx="16" ry="12" fill="#FFD580" transform="rotate(-30,38,130)"/>
        <ellipse cx="122" cy="130" rx="16" ry="12" fill="#FFD580" transform="rotate(30,122,130)"/>
        <!-- Tail -->
        <path d="M118,158 Q148,140 143,118" stroke="#FFD580" stroke-width="12" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="result-title" id="resultTitle">すごい！✨</div>
    <div class="result-score-wrap">
      <div class="result-score-label">せいかいすう</div>
      <div class="result-score" id="resultScore">0 / 10</div>
    </div>
    <div class="result-streak" id="resultStreak"></div>
    <div class="result-kanji-review" id="resultKanjiReview"></div>
    <div class="result-buttons">
      <button class="result-btn btn-retry" onclick="App.startGame()">
        <span>🔄 もういちど</span>
      </button>
      <button class="result-btn btn-menu" onclick="App.showScreen('menu')">
        <span>🏠 メニューへ</span>
      </button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
